name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate macOS icon (.icns)
        if: matrix.platform == 'mac'
        run: |
          mkdir -p build/icon.iconset
          cp build/32x32.png build/icon.iconset/icon_32x32.png
          cp build/64x64.png build/icon.iconset/icon_32x32@2x.png
          cp build/128x128.png build/icon.iconset/icon_128x128.png
          cp build/256x256.png build/icon.iconset/icon_128x128@2x.png
          cp build/256x256.png build/icon.iconset/icon_256x256.png
          cp build/512x512.png build/icon.iconset/icon_256x256@2x.png
          cp build/512x512.png build/icon.iconset/icon_512x512.png
          cp build/1024x1024.png build/icon.iconset/icon_512x512@2x.png
          iconutil -c icns build/icon.iconset -o build/icon.icns
          rm -rf build/icon.iconset

      - name: Prepare macOS signing certificate
        if: matrix.platform == 'mac'
        run: |
          CSC_LINK_RAW="${{ secrets.CSC_LINK }}"
          if [ -z "$CSC_LINK_RAW" ]; then
            echo "⚠️  No CSC_LINK secret found, skipping signing"
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> $GITHUB_ENV
            exit 0
          fi

          echo "$CSC_LINK_RAW" | base64 --decode > /tmp/djcheck-cert.p12 2>/dev/null

          echo "Certificate file size: $(wc -c < /tmp/djcheck-cert.p12) bytes"
          echo "Certificate file header (hex):" && xxd -l 16 /tmp/djcheck-cert.p12

          # Validate it's a PKCS12 file with openssl
          if openssl pkcs12 -info -in /tmp/djcheck-cert.p12 -passin "pass:${{ secrets.CSC_KEY_PASSWORD }}" -noout 2>/dev/null; then
            echo "✅ Valid PKCS12 certificate"
            echo "CSC_LINK=/tmp/djcheck-cert.p12" >> $GITHUB_ENV
          else
            echo "❌ Invalid PKCS12 format. Trying alternative decode methods..."
            # Try without stripping newlines (some secrets have wrapping)
            echo "$CSC_LINK_RAW" | tr -d '\n' | base64 --decode > /tmp/djcheck-cert.p12 2>/dev/null
            if openssl pkcs12 -info -in /tmp/djcheck-cert.p12 -passin "pass:${{ secrets.CSC_KEY_PASSWORD }}" -noout 2>/dev/null; then
              echo "✅ Valid PKCS12 after stripping newlines"
              echo "CSC_LINK=/tmp/djcheck-cert.p12" >> $GITHUB_ENV
            else
              echo "❌ Could not parse certificate. Skipping code signing."
              echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> $GITHUB_ENV
              rm -f /tmp/djcheck-cert.p12
            fi
          fi

      - name: Build & Package (${{ matrix.platform }})
        env:
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'mac' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ matrix.platform == 'mac' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_TEAM_ID || '' }}
        run: npm run package:${{ matrix.platform }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: djcheck-${{ matrix.platform }}
          path: |
            dist/*.AppImage
            dist/*.dmg
            dist/*.exe
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.AppImage" -o -name "*.dmg" -o -name "*.exe" \) -exec cp {} release/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
